<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P의 여행 — 결과 화면 목업</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    font-family: -apple-system, 'Pretendard', sans-serif;
    display: flex;
    gap: 24px;
    padding: 24px;
    justify-content: center;
    flex-wrap: wrap;
    min-height: 100vh;
    align-items: flex-start;
  }
  .label {
    color: #aaa;
    font-size: 11px;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  /* ── 모바일 프레임 ── */
  .phone {
    width: 280px;
    background: #fff;
    border-radius: 36px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border: 6px solid #222;
    position: relative;
  }
  /* ── 온보딩 화면 ── */
  .screen-onboard {
    background: #EEF4EE;
    min-height: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
  }
  .screen-onboard .logo {
    font-size: 36px;
    font-weight: 900;
    color: #2A4A2A;
    margin-bottom: 8px;
  }
  .screen-onboard .tagline {
    font-size: 13px;
    color: #5A7A5A;
    margin-bottom: 40px;
    line-height: 1.6;
  }
  .screen-onboard .location-btn {
    background: #3D6E4A;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 14px;
    font-weight: 700;
    width: 100%;
    margin-bottom: 10px;
  }
  .screen-onboard .sub-btn {
    background: transparent;
    color: #5A7A5A;
    border: 1.5px solid #B8D4B8;
    border-radius: 14px;
    padding: 12px 28px;
    font-size: 13px;
    width: 100%;
  }

  /* ── 바텀시트 입력 화면 ── */
  .screen-input {
    background: linear-gradient(180deg, #4E8B5F 0%, #2A4A2A 100%);
    min-height: 560px;
    position: relative;
    overflow: hidden;
  }
  .screen-input .bg-text {
    position: absolute;
    top: 60px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.9);
  }
  .screen-input .bg-text .q-num {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }
  .screen-input .bg-text .q-text {
    font-size: 20px;
    font-weight: 800;
    line-height: 1.3;
  }
  .bottom-sheet {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-radius: 24px 24px 0 0;
    padding: 16px 20px 28px;
  }
  .sheet-handle {
    width: 36px; height: 4px;
    background: #ddd;
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .chip-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip {
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: 1.5px solid #B8D4B8;
    color: #3D6E4A;
    background: #fff;
  }
  .chip.active {
    background: #3D6E4A;
    color: #fff;
    border-color: #3D6E4A;
  }
  .next-btn {
    margin-top: 16px;
    background: #3D6E4A;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px;
    width: 100%;
    font-size: 14px;
    font-weight: 700;
  }

  /* ── 결과 화면 ── */
  .screen-result {
    background: #EEF4EE;
    min-height: 560px;
    display: flex;
    flex-direction: column;
  }
  .result-hero {
    width: 100%;
    height: 200px;
    background: linear-gradient(180deg, #4E8B5F, #2A4A2A);
    position: relative;
    display: flex;
    align-items: flex-end;
    padding: 16px;
  }
  .result-hero .badge {
    position: absolute;
    top: 12px; right: 12px;
    background: #FFD700;
    color: #1A2E1A;
    font-size: 10px;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .result-hero .city-name {
    color: #fff;
    font-size: 22px;
    font-weight: 900;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .result-body {
    padding: 16px;
    flex: 1;
  }
  .ai-desc {
    font-size: 12px;
    color: #3D5A3D;
    line-height: 1.6;
    background: #F0F7F0;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 12px;
    border-left: 3px solid #3D6E4A;
  }
  .info-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .info-chip {
    font-size: 10px;
    color: #5A7A5A;
    background: #E8F0E8;
    padding: 4px 10px;
    border-radius: 12px;
  }
  .course-title {
    font-size: 11px;
    font-weight: 700;
    color: #2A4A2A;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .course-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .course-item {
    min-width: 90px;
    background: #fff;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    flex-shrink: 0;
  }
  .course-item .time-label {
    font-size: 9px;
    color: #7DAE7D;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .course-item .place-name {
    font-size: 11px;
    font-weight: 700;
    color: #1A2E1A;
    margin-bottom: 2px;
  }
  .course-item .place-desc {
    font-size: 9px;
    color: #888;
    line-height: 1.3;
  }
  .cta-bar {
    padding: 12px 16px 16px;
    display: flex;
    gap: 8px;
  }
  .cta-main {
    flex: 1;
    background: #3D6E4A;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-size: 13px;
    font-weight: 700;
  }
  .cta-retry {
    background: #EEF4EE;
    color: #3D6E4A;
    border: 1.5px solid #B8D4B8;
    border-radius: 12px;
    padding: 13px 14px;
    font-size: 12px;
    font-weight: 600;
  }
</style>
</head>
<body>

<div>
  <div class="label">① 온보딩</div>
  <div class="phone">
    <div class="screen-onboard">
      <div class="logo">P의 여행</div>
      <div class="tagline">계획은 없어도 괜찮아.<br>오늘 떠날 소도시, 데이터가 골라줄게요.</div>
      <button class="location-btn">📍 내 위치에서 출발</button>
      <button class="sub-btn">직접 출발지 입력</button>
    </div>
  </div>
</div>

<div>
  <div class="label">② 조건 입력 (바텀시트)</div>
  <div class="phone">
    <div class="screen-input">
      <div class="bg-text">
        <div class="q-num">2 / 4</div>
        <div class="q-text">어떻게<br>이동하실 건가요?</div>
      </div>
      <div class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="chip-row">
          <div class="chip active">🚗 자차</div>
          <div class="chip">🚆 대중교통</div>
        </div>
        <button class="next-btn">다음 →</button>
      </div>
    </div>
  </div>
</div>

<div>
  <div class="label">③ 추천 결과</div>
  <div class="phone">
    <div class="screen-result">
      <div class="result-hero">
        <div class="badge">오늘 딱이에요 ✨</div>
        <div class="city-name">전북 무주</div>
      </div>
      <div class="result-body">
        <div class="ai-desc">
          오늘 서울보다 무주가 훨씬 맑아요. 이번 주말 반딧불 축제 마지막 날이고, 지금 이 시간대가 가장 한산해요.
        </div>
        <div class="info-row">
          <div class="info-chip">🚗 2시간 20분</div>
          <div class="info-chip">☀️ 맑음 24°</div>
          <div class="info-chip">🟢 한산</div>
        </div>
        <div class="course-title">오늘의 코스</div>
        <div class="course-scroll">
          <div class="course-item">
            <div class="time-label">오전</div>
            <div class="place-name">덕유산</div>
            <div class="place-desc">케이블카<br>뷰 맛집</div>
          </div>
          <div class="course-item">
            <div class="time-label">점심</div>
            <div class="place-name">무주 식당가</div>
            <div class="place-desc">어죽·향어<br>현지 맛집</div>
          </div>
          <div class="course-item">
            <div class="time-label">오후</div>
            <div class="place-name">반딧불 축제</div>
            <div class="place-desc">오늘 마지막<br>날 🎉</div>
          </div>
        </div>
      </div>
      <div class="cta-bar">
        <button class="cta-main">지금 출발할게요</button>
        <button class="cta-retry">다시 ↻</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
